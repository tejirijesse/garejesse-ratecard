<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gare Jesse — A studio of light.</title>
<meta name="description" content="Gare Jesse Productions. Cinematography, photography, and branded content. Nairobi." />
<link rel="icon" type="image/png" href="logo.png" />
<link rel="apple-touch-icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,700&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="landing.css" />
</head>
<body>
<div class="grain"></div>

<!-- Camera cursor (reused from rate card) -->
<div class="cam-cursor" id="cursor" aria-hidden="true">
  <svg viewBox="0 0 48 36" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round">
    <path d="M6 10 L14 10 L17 5 L31 5 L34 10 L42 10 Q46 10 46 14 L46 28 Q46 32 42 32 L6 32 Q2 32 2 28 L2 14 Q2 10 6 10 Z"/>
    <circle cx="24" cy="21" r="8"/>
    <circle cx="24" cy="21" r="4.5"/>
    <circle cx="39" cy="14" r="1" fill="currentColor"/>
  </svg>
</div>
<div class="cam-bracket" id="cursorRing" aria-hidden="true">
  <span class="br tl"></span><span class="br tr"></span>
  <span class="br bl"></span><span class="br br2"></span>
</div>

<!-- Soft light that follows the cursor -->
<div class="lamp" id="lamp"></div>

<main class="page">

  <!-- Top frame -->
  <header class="frame frame-top">
    <a href="/" class="mark" data-hover>
      <img src="logo.png" alt="Gare Jesse" />
      <span>GARE JESSE</span>
    </a>
    <div class="meta">
      <span>Nairobi · 1°17′S 36°49′E</span>
      <span class="dot">·</span>
      <span id="clock">—</span>
    </div>
    <a href="mailto:hello@garejesse.com" class="contact" data-hover>hello@garejesse.com</a>
  </header>

  <!-- Center -->
  <section class="stage">

    <!-- Abstract SVG: two slow-moving concentric arcs and a hairline that draws across -->
    <svg class="abstract" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <defs>
        <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="var(--ink)" stop-opacity="0"/>
          <stop offset="50%" stop-color="var(--ink)" stop-opacity="1"/>
          <stop offset="100%" stop-color="var(--ink)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Hairline -->
      <line class="line-h" x1="50" y1="300" x2="950" y2="300" stroke="url(#ink)" stroke-width="1"/>
      <!-- Outer ring -->
      <circle class="ring outer" cx="500" cy="300" r="240" fill="none" stroke="var(--ink)" stroke-width="1" stroke-dasharray="2 6"/>
      <!-- Inner ring -->
      <circle class="ring inner" cx="500" cy="300" r="100" fill="none" stroke="var(--ink)" stroke-width="1"/>
      <!-- Aperture blade -->
      <path class="blade" d="M500 200 L580 260 L580 340 L500 400 L420 340 L420 260 Z" fill="none" stroke="var(--ink)" stroke-width="1"/>
      <!-- Tick marks -->
      <g class="ticks">
        <line x1="500" y1="40"  x2="500" y2="56"  stroke="var(--ink)"/>
        <line x1="500" y1="544" x2="500" y2="560" stroke="var(--ink)"/>
        <line x1="40"  y1="300" x2="56"  y2="300" stroke="var(--ink)"/>
        <line x1="944" y1="300" x2="960" y2="300" stroke="var(--ink)"/>
      </g>
    </svg>

    <h1 class="bigtype">
      <span class="row">
        <span class="word" data-split>Gare</span>
        <span class="word" data-split>Jesse.</span>
      </span>
      <span class="sub">
        <em>A studio of light.</em>
      </span>
    </h1>

    <!-- Rotating discipline -->
    <div class="rotor" aria-live="polite">
      <span class="rotor-label">Working in</span>
      <span class="rotor-stage">
        <span class="rotor-word is-active">Cinematography.</span>
        <span class="rotor-word">Photography.</span>
        <span class="rotor-word">Branded Content.</span>
        <span class="rotor-word">Direction.</span>
      </span>
    </div>
  </section>

  <!-- Bottom frame -->
  <footer class="frame frame-bottom">
    <div class="links">
      <a href="rate-card.html" class="ghost-link" data-hover>
        <span class="num">01</span>
        <span class="label">Rate Card 2026</span>
        <span class="arrow">→</span>
      </a>
      <a href="#work" class="ghost-link" data-hover>
        <span class="num">02</span>
        <span class="label">Selected Work</span>
        <span class="arrow soon">soon</span>
      </a>
      <a href="mailto:hello@garejesse.com" class="ghost-link" data-hover>
        <span class="num">03</span>
        <span class="label">Start a Project</span>
        <span class="arrow">→</span>
      </a>
    </div>
    <div class="footer-meta">
      <span>© Gare Jesse 2026</span>
      <span class="dot">·</span>
      <span>v0.1 — Landing</span>
    </div>
  </footer>

</main>

<script src="landing.js"></script>
</body>
</html>
